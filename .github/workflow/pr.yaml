name: Pull request workflow

on:
  pull_request:
    branches:
      - developer/v1.0
  workflow_dispatch:

jobs:
  PR-job:
    runs-on: self-hosted
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.3
        with:
          cache: true
          version: v0.65.0

      - name: Build and export order service to Docker
        uses: docker/build-push-action@v6
        with:
          context: ./src/order-service
          load: true
          tags: order-service:${{ github.sha }}

      - name: Run Trivy vulnerability scan for order service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: order-service:${{ github.sha }}
          format: sarif
          output: order-trivy-results.sarif

      - name: Build and export product service to Docker
        uses: docker/build-push-action@v6
        with:
          context: ./src/product-service
          load: true
          tags: product-service:${{ github.sha }}

      - name: Run Trivy vulnerability scan for product service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: product-service:${{ github.sha }}
          format: sarif
          output: product-trivy-results.sarif

      - name: Build and export store front service to Docker
        uses: docker/build-push-action@v6
        with:
          context: ./src/store-front
          load: true
          tags: store-front:${{ github.sha }}

      - name: Run Trivy vulnerability scan for store front service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: store-front:${{ github.sha }}
          format: sarif
          output: store-front-trivy-results.sarif

      - name: Build and export makeline service to Docker
        uses: docker/build-push-action@v6
        with:
          context: ./src/makeline-service
          load: true
          tags: makeline-service:${{ github.sha }}

      - name: Run Trivy vulnerability scan for makeline service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: makeline-service:${{ github.sha }}
          format: sarif
          output: makeline-trivy-results.sarif

      - name: Build and export store admin service to Docker
        uses: docker/build-push-action@v6
        with:
          context: ./src/store-admin
          load: true
          tags: store-admin:${{ github.sha }}

      - name: Run Trivy vulnerability scan for store admin service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: store-admin:${{ github.sha }}
          format: sarif
          output: store-admin-trivy-results.sarif

      - name: Build and export virtual customer service to Docker
        uses: docker/build-push-action@v6
        with:
          context: ./src/virtual-customer
          load: true
          tags: virtual-customer:${{ github.sha }}

      - name: Run Trivy vulnerability scan for virtual customer service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: virtual-customer:${{ github.sha }}
          format: sarif
          output: virtual-customer-trivy-results.sarif

      - name: Build and export virtual worker service to Docker
        uses: docker/build-push-action@v6
        with:
          context: ./src/virtual-worker
          load: true
          tags: virtual-worker:${{ github.sha }}

      - name: Run Trivy vulnerability scan for virtual worker service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: virtual-worker:${{ github.sha }}
          format: sarif
          output: virtual-worker-trivy-results.sarif