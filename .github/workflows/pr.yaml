name: Pull request workflow

on:
  pull_request:
    branches:
      - developer/v1.0
  workflow_dispatch:

jobs:
  PR-job:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      

      # Order Service
      - name: Build order service
        uses: docker/build-push-action@v6
        with:
          context: ./src/order-service
          load: true
          tags: order-service:${{ github.sha }}

      - name: Scan order service
        run: |
         trivy image \
          --format sarif \
          --output trivy-order-service.sarif \
          order-service:${{ github.sha }}

      # Product Service
      - name: Build product service
        uses: docker/build-push-action@v6
        with:
          context: ./src/product-service
          load: true
          tags: product-service:${{ github.sha }}

      - name: Scan product service
        run: |
         trivy image \
          --format sarif \
          --output trivy-product-service.sarif \
          product-service:${{ github.sha }}

      # Store Front
      - name: Build store front
        uses: docker/build-push-action@v6
        with:
          context: ./src/store-front
          load: true
          tags: store-front:${{ github.sha }}

      - name: Scan store front
        run: |
         trivy image \
          --format sarif \
          --output trivy-store-front.sarif \
          store-front:${{ github.sha }}

      # Makeline
      - name: Build makeline service
        uses: docker/build-push-action@v6
        with:
          context: ./src/makeline-service
          load: true
          tags: makeline-service:${{ github.sha }}

      - name: Scan makeline service
        run: |
         trivy image \
          --format sarif \
          --output trivy-makeline-service.sarif \
          makeline-service:${{ github.sha }}

      # Store Admin
      - name: Build store admin
        uses: docker/build-push-action@v6
        with:
          context: ./src/store-admin
          load: true
          tags: store-admin:${{ github.sha }}

      - name: Scan store admin
        run: |
         trivy image \
          --format sarif \
          --output trivy-store-admin.sarif \
          store-admin:${{ github.sha }}

      # Virtual Customer
      - name: Build virtual customer
        uses: docker/build-push-action@v6
        with:
          context: ./src/virtual-customer
          load: true
          tags: virtual-customer:${{ github.sha }}

      - name: Scan virtual customer
        run: |
         trivy image \
          --format sarif \
          --output trivy-virtual-customer.sarif \
          virtual-customer:${{ github.sha }}

      # Virtual Worker
      - name: Build virtual worker
        uses: docker/build-push-action@v6
        with:
          context: ./src/virtual-worker
          load: true
          tags: virtual-worker:${{ github.sha }}

      - name: Scan virtual worker
        run: |
         trivy image \
          --format sarif \
          --output trivy-virtual-worker.sarif \
          virtual-worker:${{ github.sha }}

      - name: Build ai-service
        uses: docker/build-push-action@v6
        with:
          context: ./src/ai-service
          load: true
          tags: ai-service:${{ github.sha }}

      - name: Scan ai-service
        run: |
         trivy image \
          --format sarif \
          --output trivy-ai-service.sarif \
          ai-service:${{ github.sha }}    

         
