name: Pull request workflow

on:
  pull_request:
    branches:
      - developer/v1.0
  workflow_dispatch:

jobs:
  PR-job:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
        with:
          cache: true

      # Order service
      - name: Build order service image
        uses: docker/build-push-action@v6
        with:
          context: ./src/order-service
          load: true
          tags: order-service:${{ github.event.pull_request.head.sha }}

      - name: Scan order service
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: order-service:${{ github.event.pull_request.head.sha }}
          format: sarif
          output: trivy-order.sarif

      # Product service
      - name: Build product service image
        uses: docker/build-push-action@v6
        with:
          context: ./src/product-service
          load: true
          tags: product-service:${{ github.event.pull_request.head.sha }}

      - name: Scan product service
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: product-service:${{ github.event.pull_request.head.sha }}
          format: sarif
          output: trivy-product.sarif

      # Store front service
      - name: Build store front image
        uses: docker/build-push-action@v6
        with:
          context: ./src/store-front
          load: true
          tags: store-front:${{ github.event.pull_request.head.sha }}

      - name: Scan store front
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: store-front:${{ github.event.pull_request.head.sha }}
          format: sarif
          output: trivy-store-front.sarif